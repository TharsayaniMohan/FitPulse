{% extends 'base.html' %}

{% block content %}
<section class="page-header">
    <h1>Workout Plans</h1>
    <p>Find the best training plan based on your fitness level.</p>
</section>

<section class="workout-grid">
    {% for workout in workout_plans %}
    <div class="workout-card">
        <h2>{{ workout.title }}</h2>
        <p><strong>Duration:</strong> {{ workout.duration }}</p>
        <p><strong>Level:</strong> {{ workout.level }}</p>
        <p>{{ workout.description }}</p>
    </div>
    {% endfor %}
</section>
{% endblock %}
